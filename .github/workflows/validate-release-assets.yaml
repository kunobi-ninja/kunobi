name: Validate Release Assets

on:
  pull_request:
    paths:
      - 'releases/assets.json'
      - 'releases/assets.json.sha256'
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout for validation'
        required: false
        type: string
        default: ''

jobs:
  validate-release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Validate JSON structure
        run: |
          echo "Validating releases/assets.json structure..."

          # Check file exists and is valid JSON
          jq empty releases/assets.json

          # Verify required fields
          VERSION=$(jq -r '.version' releases/assets.json)
          CHANNEL=$(jq -r '.channel' releases/assets.json)
          PLATFORM_COUNT=$(jq '.platforms | length' releases/assets.json)

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: ❌ missing version field" >&2
            exit 1
          fi

          if [ -z "$CHANNEL" ] || [ "$CHANNEL" = "null" ]; then
            echo "Error: ❌ missing channel field" >&2
            exit 1
          fi

          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "Error: ❌ no platforms found" >&2
            exit 1
          fi

          echo "Version: $VERSION"
          echo "Channel: $CHANNEL"
          echo "Platforms: $PLATFORM_COUNT"
          jq -r '.platforms | keys[]' releases/assets.json

      - name: Verify sha256 checksum
        run: |
          echo "Verifying releases/assets.json checksum..."

          EXPECTED=$(cut -d' ' -f1 releases/assets.json.sha256)
          ACTUAL=$(sha256sum releases/assets.json | cut -d' ' -f1)

          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"

          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Error: ❌ SHA256 mismatch!" >&2
            exit 1
          fi

          echo "✅ SHA256 verified for releases/assets.json"

      - name: Verify R2 artifacts and checksums
        run: |
          echo "Downloading and verifying all artifacts..."
          TMPDIR=$(mktemp -d)

          while IFS=' ' read -r expected_sha url; do
            filename=$(basename "$url")
            echo "  Downloading from $url"

            if ! curl -fsSL "$url" -o "$TMPDIR/$filename"; then
              echo "  Error: ❌ failed to download $url" >&2
              exit 1
            fi

            actual_sha=$(sha256sum "$TMPDIR/$filename" | cut -d' ' -f1)
            if [ "$expected_sha" != "$actual_sha" ]; then
              echo "  Error: ❌ SHA256 mismatch for asset $filename" >&2
              echo "    Expected: $expected_sha" >&2
              echo "    Actual:   $actual_sha" >&2
              exit 1
            fi

            echo "  ✅ Download and SHA256 verified for asset $filename"
            rm -f "$TMPDIR/$filename"
          done < <(jq -r '.platforms | to_entries[] | .value[] | "\(.sha256) \(.url)"' releases/assets.json)

          rm -rf "$TMPDIR"
          echo "✅ All artifacts downloaded and checksums verified"
